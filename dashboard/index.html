<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Command Center</title>
<style>
:root {
  --bg: #0d0d12;
  --bg-card: #16161e;
  --bg-card-hover: #1c1c28;
  --border: #2a2a3a;
  --purple: #a855f7;
  --purple-dim: #7c3aed;
  --purple-glow: rgba(168,85,247,0.15);
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #eab308;
  --orange: #f97316;
  --text: #e2e2ea;
  --text-dim: #8888a0;
  --text-bright: #ffffff;
  --mono: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', 'Consolas', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}
a { color: var(--purple); text-decoration: none; }

/* header */
.header {
  background: linear-gradient(135deg, #12121a 0%, #1a1028 100%);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-bright);
  letter-spacing: 1px;
}
.header h1 span { color: var(--purple); }
.header-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 11px;
  color: var(--text-dim);
}
.refresh-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* layout */
.container {
  max-width: 1440px;
  margin: 0 auto;
  padding: 20px;
  display: grid;
  gap: 16px;
}
.row { display: grid; gap: 16px; }
.row-3 { grid-template-columns: 1fr 1fr 1fr; }
.row-2 { grid-template-columns: 1fr 1fr; }
.row-1 { grid-template-columns: 1fr; }

/* cards */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--purple-dim); }
.card-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--purple);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title::before {
  content: '';
  width: 3px;
  height: 14px;
  background: var(--purple);
  border-radius: 2px;
  display: inline-block;
}

/* system health bar */
.health-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
}
.health-item {
  display: flex;
  align-items: center;
  gap: 10px;
}
.health-value {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-bright);
}
.health-label {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* status dot */
.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.dot-green { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot-red { background: var(--red); box-shadow: 0 0 6px var(--red); }
.dot-yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }

/* process list */
.proc-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid rgba(42,42,58,0.5);
}
.proc-row:last-child { border-bottom: none; }
.proc-name {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
}
.proc-pids { font-size: 11px; color: var(--text-dim); }

/* action list */
.action-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(42,42,58,0.3);
}
.action-item:last-child { border-bottom: none; }
.priority-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  font-weight: 600;
  flex-shrink: 0;
  margin-top: 2px;
}
.priority-high { background: rgba(239,68,68,0.2); color: var(--red); }
.priority-medium { background: rgba(234,179,8,0.2); color: var(--yellow); }
.priority-low { background: rgba(34,197,94,0.2); color: var(--green); }
.action-text { font-size: 12px; }
.action-reason { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* nomads section */
.phase-badge {
  display: inline-block;
  background: linear-gradient(135deg, var(--purple-dim), var(--purple));
  color: #fff;
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
}
.countdown {
  font-size: 28px;
  font-weight: 700;
  color: var(--purple);
  margin: 8px 0;
}
.countdown-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
.post-preview {
  background: rgba(168,85,247,0.06);
  border-left: 3px solid var(--purple);
  padding: 10px 14px;
  font-size: 12px;
  line-height: 1.6;
  color: var(--text);
  margin-top: 10px;
  border-radius: 0 6px 6px 0;
}
.trend-angle {
  padding: 6px 0;
  border-bottom: 1px solid rgba(42,42,58,0.3);
  font-size: 12px;
}
.trend-angle:last-child { border-bottom: none; }
.trend-tag {
  font-size: 10px;
  color: var(--purple);
  text-transform: uppercase;
  font-weight: 600;
}

/* project grid */
.project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.project-card {
  background: rgba(22,22,30,0.8);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  transition: all 0.2s;
}
.project-card:hover {
  border-color: var(--purple);
  background: var(--bg-card-hover);
}
.project-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 8px;
}
.project-detail {
  font-size: 11px;
  color: var(--text-dim);
  margin: 3px 0;
}

/* terminal log */
.log-terminal {
  background: #0a0a0f;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.log-titlebar {
  background: #1a1a25;
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  border-bottom: 1px solid var(--border);
}
.log-dot { width: 10px; height: 10px; border-radius: 50%; }
.log-dot-r { background: #ff5f57; }
.log-dot-y { background: #febc2e; }
.log-dot-g { background: #28c840; }
.log-title { font-size: 11px; color: var(--text-dim); margin-left: 8px; }
.log-body {
  padding: 12px 16px;
  max-height: 360px;
  overflow-y: auto;
  font-size: 11px;
  line-height: 1.7;
  color: #a0a0b8;
}
.log-body::-webkit-scrollbar { width: 6px; }
.log-body::-webkit-scrollbar-track { background: transparent; }
.log-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.log-line { white-space: pre-wrap; word-break: break-all; }
.log-line-ts { color: var(--purple-dim); }

/* model table */
.model-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.model-table th {
  text-align: left;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
}
.model-table td {
  padding: 8px;
  border-bottom: 1px solid rgba(42,42,58,0.3);
}
.model-loaded { color: var(--green); font-weight: 600; }
.model-idle { color: var(--text-dim); }

/* meta info */
.meta { font-size: 11px; color: var(--text-dim); margin-top: 8px; }
.ts { color: var(--purple-dim); font-size: 11px; }

/* sentiment */
.sentiment-bullish { color: var(--green); font-weight: 600; text-transform: uppercase; }
.sentiment-bearish { color: var(--red); font-weight: 600; text-transform: uppercase; }
.sentiment-neutral { color: var(--yellow); font-weight: 600; text-transform: uppercase; }

/* responsive */
@media (max-width: 1024px) {
  .row-3 { grid-template-columns: 1fr; }
  .row-2 { grid-template-columns: 1fr; }
}

/* fade in */
.fade-in { animation: fadeIn 0.4s ease-in; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* loading state */
.loading { text-align: center; padding: 40px; color: var(--text-dim); }
</style>
</head>
<body>

<div class="header">
  <h1><span>OPEN</span>CLAW <span style="font-weight:300; font-size:13px; margin-left:6px;">COMMAND CENTER</span></h1>
  <div class="header-meta">
    <span id="last-update">loading...</span>
    <span class="refresh-dot"></span>
    <span>Auto-refresh 30s</span>
  </div>
</div>

<div class="container" id="app">
  <div class="loading" id="loading-msg">Connecting to API...</div>
</div>

<script>
const $ = (sel) => document.querySelector(sel);
const app = $('#app');

function ago(ts) {
  if (!ts) return 'never';
  const d = new Date(ts);
  if (isNaN(d)) return ts;
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function fmtTs(ts) {
  if (!ts) return '--';
  const d = new Date(ts);
  if (isNaN(d)) return ts;
  return d.toLocaleString('en-US', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false});
}

function esc(s) {
  if (!s) return '';
  const el = document.createElement('span');
  el.textContent = s;
  return el.innerHTML;
}

function dotHtml(running) {
  return `<span class="dot ${running ? 'dot-green' : 'dot-red'}"></span>`;
}

function priorityClass(p) {
  if (p === 'high') return 'priority-high';
  if (p === 'medium') return 'priority-medium';
  return 'priority-low';
}

function sentimentClass(s) {
  if (!s) return 'sentiment-neutral';
  if (s.includes('bullish')) return 'sentiment-bullish';
  if (s.includes('bearish')) return 'sentiment-bearish';
  return 'sentiment-neutral';
}

function truncate(s, n) {
  if (!s) return '';
  return s.length > n ? s.slice(0, n) + '...' : s;
}

function render(d) {
  const sys = d.system || {};
  const mem = sys.memory || {};
  const oll = d.ollama || {};
  const procs = d.processes || {};
  const state = d.orchestrator_state || {};
  const phase = d.phase_state || {};
  const plan = d.action_plan || {};
  const trend = d.trend_report || {};
  const posts = d.farcaster_posts || [];
  const decisions = d.recent_decisions || [];
  const logs = d.log_tail || [];
  const installed = oll.installed_models || [];
  const running = oll.running_models || [];
  const runningNames = new Set(running.map(m => m.name));

  // health check result from decisions
  let healthResults = {};
  for (const dec of decisions) {
    if (dec.outcomes) {
      for (const o of dec.outcomes) {
        if (o.action === 'health_check_all' && o.output) {
          o.output.split(', ').forEach(part => {
            const [name, status] = part.split(':');
            if (name && status) healthResults[name.trim()] = status.trim();
          });
        }
      }
    }
  }

  // last activity per project from state
  const projects = [
    { name: 'Neural Nomads', key: 'self-heal', health: healthResults['self-heal'] || '--', activity: state.last_build || state.last_post },
    { name: 'bits.tax', key: 'bits.tax-health', health: healthResults['bits.tax-health'] || '--', activity: null },
    { name: 'a.ai', key: 'a.ai-health', health: healthResults['a.ai-health'] || '--', activity: null },
    { name: 'teranode.ai', key: 'teranode-health', health: healthResults['teranode-health'] || '--', activity: null },
    { name: 'Interview Prep', key: 'interview-health', health: healthResults['interview-health'] || '--', activity: null },
  ];

  let html = '';

  // ── System Health ──
  html += `<div class="row row-1 fade-in">
    <div class="card">
      <div class="card-title">System Health</div>
      <div class="health-bar">
        <div class="health-item">
          <div>
            <div class="health-value">${esc(mem.percent ? mem.percent + '%' : '--')}</div>
            <div class="health-label">RAM (${mem.used_gb || 0}/${mem.total_gb || 0} GB)</div>
          </div>
        </div>
        <div class="health-item">
          <div>
            <div class="health-value" style="font-size:13px;">${esc(sys.cpu || '--')}</div>
            <div class="health-label">CPU</div>
          </div>
        </div>
        <div class="health-item">
          <div>
            <div class="health-value" style="font-size:14px;">${esc(sys.uptime || '--')}</div>
            <div class="health-label">Uptime</div>
          </div>
        </div>
        <div class="health-item">
          ${dotHtml(oll.status === 'running')}
          <div>
            <div class="health-value" style="font-size:14px;">${esc(oll.status || 'unknown')}</div>
            <div class="health-label">Ollama (${running.length} loaded)</div>
          </div>
        </div>
        <div class="health-item">
          <div>
            <div class="health-value" style="font-size:14px;">${esc(sys.hostname || '--')}</div>
            <div class="health-label">Host</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;

  // ── Processes + Autonomous Engine + Neural Nomads ──
  html += `<div class="row row-3 fade-in">`;

  // Processes
  html += `<div class="card">
    <div class="card-title">Running Processes</div>`;
  for (const [name, info] of Object.entries(procs)) {
    const label = name.replace(/_/g, ' ');
    html += `<div class="proc-row">
      <div class="proc-name">${dotHtml(info.running)} ${esc(label)}</div>
      <div class="proc-pids">${info.running ? 'PID ' + info.pids.join(', ') : 'stopped'}</div>
    </div>`;
  }
  html += `<div class="meta">Last health check: ${ago(state.last_health_check)}</div>`;
  html += `</div>`;

  // Autonomous Engine
  html += `<div class="card">
    <div class="card-title">Autonomous Engine</div>
    <div style="margin-bottom:8px">
      <span class="ts">${fmtTs(plan.generated_at)}</span>
      <span class="meta" style="margin-left:8px">${plan.thinking_time_ms ? plan.thinking_time_ms + 'ms thinking' : ''}</span>
    </div>
    <div style="font-size:12px; margin-bottom:10px; color:var(--text)">${esc(plan.assessment || '--')}</div>`;
  if (plan.actions) {
    for (const a of plan.actions) {
      html += `<div class="action-item">
        <span class="priority-badge ${priorityClass(a.priority)}">${esc(a.priority)}</span>
        <div>
          <div class="action-text">${esc(a.action)}</div>
          <div class="action-reason">${esc(a.reasoning)}</div>
        </div>
      </div>`;
    }
  }
  html += `<div class="meta">Model: ${esc(plan.model_used || '--')}</div>`;
  html += `</div>`;

  // Neural Nomads
  const lastPost = posts.length > 0 ? posts[posts.length - 1] : null;
  html += `<div class="card">
    <div class="card-title">Neural Nomads</div>
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px">
      <span class="phase-badge">${esc(phase.phase || '--')}</span>
    </div>
    <div class="countdown">${phase.days_left != null ? phase.days_left : '--'}</div>
    <div class="countdown-label">Days until drop</div>`;
  if (lastPost) {
    html += `<div class="post-preview">
      <div style="font-size:10px; color:var(--text-dim); margin-bottom:4px">${esc(lastPost.piece || '')} &middot; ${ago(lastPost.timestamp)}</div>
      ${esc(truncate(lastPost.text, 180))}
    </div>`;
  }
  html += `<div class="meta">Last build: ${ago(state.last_build)} &middot; Last post: ${ago(state.last_post)}</div>`;
  html += `</div>`;

  html += `</div>`; // end row-3

  // ── Trend Report + Project Status ──
  html += `<div class="row row-2 fade-in">`;

  // Trend Report
  html += `<div class="card">
    <div class="card-title">Trend Intelligence</div>`;
  if (trend.market_sentiment) {
    html += `<div style="margin-bottom:10px">Sentiment: <span class="${sentimentClass(trend.market_sentiment)}">${esc(trend.market_sentiment)}</span></div>`;
  }
  if (trend.content_angles) {
    html += `<div style="font-size:11px; color:var(--text-dim); margin-bottom:6px">TOP CONTENT ANGLES</div>`;
    for (const angle of trend.content_angles.slice(0, 3)) {
      html += `<div class="trend-angle">${esc(angle)}</div>`;
    }
  }
  if (trend.cultural_moment) {
    html += `<div style="margin-top:10px; font-size:11px; color:var(--text-dim)">CULTURAL MOMENT</div>
    <div style="font-size:12px; margin-top:4px">${esc(truncate(trend.cultural_moment, 200))}</div>`;
  }
  html += `<div class="meta">Updated: ${ago(trend.generated_at)}</div>`;
  html += `</div>`;

  // Project Status Grid
  html += `<div class="card">
    <div class="card-title">Project Status</div>
    <div class="project-grid">`;
  for (const p of projects) {
    const ok = p.health === 'OK';
    html += `<div class="project-card">
      <div class="project-name">${dotHtml(ok)} ${esc(p.name)}</div>
      <div class="project-detail">Health: ${esc(p.health)}</div>
      ${p.activity ? `<div class="project-detail">Last activity: ${ago(p.activity)}</div>` : ''}
    </div>`;
  }
  html += `</div>
    <div class="meta">Last health check: ${ago(state.last_health_check)}</div>
  </div>`;

  html += `</div>`; // end row-2

  // ── Activity Log + Model Fleet ──
  html += `<div class="row row-2 fade-in">`;

  // Activity Log
  html += `<div class="card" style="padding:0; overflow:hidden;">
    <div class="log-terminal">
      <div class="log-titlebar">
        <span class="log-dot log-dot-r"></span>
        <span class="log-dot log-dot-y"></span>
        <span class="log-dot log-dot-g"></span>
        <span class="log-title">orchestrator.log</span>
      </div>
      <div class="log-body" id="log-body">`;
  for (const line of logs) {
    const parts = line.match(/^(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d+)(.*)$/);
    if (parts) {
      html += `<div class="log-line"><span class="log-line-ts">${esc(parts[1])}</span>${esc(parts[2])}</div>`;
    } else {
      html += `<div class="log-line">${esc(line)}</div>`;
    }
  }
  html += `</div></div></div>`;

  // Model Fleet
  html += `<div class="card">
    <div class="card-title">Model Fleet</div>
    <table class="model-table">
      <thead><tr><th>Model</th><th>Size</th><th>Status</th></tr></thead>
      <tbody>`;
  if (installed.length === 0) {
    html += `<tr><td colspan="3" style="color:var(--text-dim)">No models found (Ollama may be stopped)</td></tr>`;
  }
  for (const m of installed) {
    const loaded = runningNames.has(m.name);
    html += `<tr>
      <td>${esc(m.name)}</td>
      <td>${m.size_gb} GB</td>
      <td class="${loaded ? 'model-loaded' : 'model-idle'}">${loaded ? 'LOADED' : 'idle'}</td>
    </tr>`;
  }
  html += `</tbody></table>
  </div>`;

  html += `</div>`; // end row-2

  app.innerHTML = html;

  // auto-scroll log
  const lb = document.getElementById('log-body');
  if (lb) lb.scrollTop = lb.scrollHeight;
}

async function refresh() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    render(data);
    $('#last-update').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    $('#last-update').textContent = 'Error: ' + e.message;
  }
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
