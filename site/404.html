<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lost Between Thresholds — Neural Nomads</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◎</text></svg>">
  <meta name="theme-color" content="#04040a">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #04040a;
      --surface: #08080f;
      --border: rgba(255,255,255,0.06);
      --text: #d4d0c8;
      --muted: #4a4750;
      --accent: #9b7fe8;
      --white: #f0ede6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    .eyebrow {
      font-family: 'Courier Prime', monospace;
      font-size: .65rem;
      letter-spacing: .4em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    .code {
      font-size: clamp(5rem, 15vw, 12rem);
      font-weight: 300;
      letter-spacing: .08em;
      line-height: 1;
      color: var(--white);
      opacity: 0.08;
      position: absolute;
      user-select: none;
    }

    .message {
      position: relative;
      z-index: 1;
    }

    .title {
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      font-weight: 300;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 32px;
    }

    .title em {
      font-style: italic;
      color: var(--accent);
    }

    .verse {
      font-size: clamp(0.95rem, 1.8vw, 1.15rem);
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      line-height: 1.9;
      max-width: 480px;
      margin: 0 auto 56px;
    }

    .return-link {
      display: inline-block;
      padding: 14px 48px;
      border: 1px solid rgba(155,127,232,0.4);
      color: var(--accent);
      text-decoration: none;
      font-family: 'Courier Prime', monospace;
      font-size: .7rem;
      letter-spacing: .3em;
      text-transform: uppercase;
      transition: all .4s;
    }

    .return-link:hover {
      background: var(--accent);
      color: var(--bg);
    }

    footer {
      position: absolute;
      bottom: 40px;
      font-family: 'Courier Prime', monospace;
      font-size: .6rem;
      letter-spacing: .3em;
      color: var(--muted);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <span class="code">404</span>
  <div class="message">
    <p class="eyebrow">Signal not found</p>
    <h1 class="title">Lost between <em>thresholds</em></h1>
    <p class="verse">
      You have wandered past the edge of the map,<br>
      into the space between phases —<br>
      where the architecture has not yet named itself.
    </p>
    <a href="https://neuralnomads.shop" class="return-link">Return to the threshold</a>
  </div>
  <footer>Neural Nomads — The Threshold</footer>
</body>
</html>
